<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bus - Centro de Controle</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: #a0aabf;
            --accent-blue: #00f2fe;
            --accent-purple: #4facfe;
            --success-green: #00f260;
            --alert-red: #ff0844;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-main);
            min-height: 100vh;
            padding: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            background: -webkit-linear-gradient(var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
        }

        .kpi-card h3 {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 400;
        }

        .kpi-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .value.highlight {
            color: var(--accent-blue);
        }

        /* Estilo para o Card de Manutenção (Alerta Visual) */
        .kpi-card.alert {
            border-color: var(--alert-red);
            box-shadow: 0 0 20px rgba(255, 8, 68, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(255, 8, 68, 0.4); }
            50% { box-shadow: 0 0 30px rgba(255, 8, 68, 0.8); }
            100% { box-shadow: 0 0 15px rgba(255, 8, 68, 0.4); }
        }

        .status-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
            text-align: center;
        }

        .status-badge.success {
            background: rgba(0, 242, 96, 0.1);
            color: var(--success-green);
            border: 1px solid rgba(0, 242, 96, 0.3);
        }

        .status-badge.danger {
            background: rgba(255, 8, 68, 0.1);
            color: var(--alert-red);
            border: 1px solid rgba(255, 8, 68, 0.3);
        }

        .chart-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            height: 400px;
            margin-top: 20px;
        }

        .chart-container h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .fade-in {
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="fade-in">

    <header>
        <h1>Centro de Controle Operacional</h1>
        <p>Monitoramento em Tempo Real - IA e Sensores Físicos</p>
    </header>

    <div class="dashboard-grid">
        <div class="kpi-card">
            <h3>Variáveis Físicas Atuais</h3>
            <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                <div>
                    <span style="color: var(--text-muted); font-size: 0.9rem;">Lotação</span><br>
                    <span style="font-size: 1.5rem; font-weight: 600;">38 pass.</span>
                </div>
                <div>
                    <span style="color: var(--text-muted); font-size: 0.9rem;">Temp. Externa</span><br>
                    <span style="font-size: 1.5rem; font-weight: 600;">28°C</span>
                </div>
            </div>
        </div>

        <div class="kpi-card">
            <h3>Consumo do HVAC (Real)</h3>
            <div class="value highlight" id="consumo-real">12.2 kW</div>
        </div>

        <div class="kpi-card" id="card-manutencao">
            <h3>Previsão de Falha (Modelo GB)</h3>
            <div id="badge-falha" class="status-badge success">✔️ Sistema Saudável</div>
        </div>
    </div>

    <div class="chart-container">
        <h2>Monitoramento de Resíduo (Potência Esperada vs. Real)</h2>
        <div style="position: relative; height: 90%; width: 100%;">
            <canvas id="residuoChart"></canvas>
        </div>
    </div>

    <script>
        // Configurações globais do Chart.js para combinar com o tema
        Chart.defaults.color = '#a0aabf';
        Chart.defaults.font.family = 'Poppins';

        // Dados iniciais para o gráfico (simulando histórico recente)
        let currentData = [0.2, 0.3, 0.1, 0.4, 0.2, 0.5, 0.6, 0.4, 0.5, 0.3]; 
        let labels = ['-9m', '-8m', '-7m', '-6m', '-5m', '-4m', '-3m', '-2m', '-1m', 'Agora'];

        const ctx = document.getElementById('residuoChart').getContext('2d');
        const residuoChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Resíduo (kW)',
                    data: currentData,
                    borderColor: '#00f2fe',
                    backgroundColor: 'rgba(0, 242, 254, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#ffffff',
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false } // Escondemos a legenda para ficar mais limpo
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' }
                    },
                    y: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        suggestedMin: -1,
                        suggestedMax: 3,
                        title: { display: true, text: 'Diferença em kW', color: '#a0aabf' }
                    }
                }
            }
        });

        // Loop de simulação em tempo real
        setInterval(() => {
            let lastValue = currentData[currentData.length - 1];
            
            // Simula uma leve variação nos dados (ruído)
            let step = (Math.random() * 0.4 - 0.2);
            let newValue = lastValue + step;
            
            // Adicionando uma chance de "anomalia" para testar o alerta visual
            if(Math.random() > 0.95) newValue += 1.2; 
            if(newValue < 0) newValue = 0.1;

            // Atualiza o card de Consumo Real
            document.getElementById('consumo-real').innerText = (12.2 + newValue).toFixed(1) + ' kW';
            
            // Atualiza os arrays do gráfico
            currentData.shift();
            currentData.push(newValue);
            residuoChart.update();

            // Lógica do Threshold (Modelo apitando se o resíduo contínuo subir muito)
            const cardManutencao = document.getElementById('card-manutencao');
            const badgeFalha = document.getElementById('badge-falha');

            // Limiar de 1.5 kW (conforme os testes do seu notebook)
            if (newValue > 1.5) {
                cardManutencao.classList.add('alert');
                badgeFalha.className = 'status-badge danger';
                badgeFalha.innerText = '⚠️ ALERTA MECÂNICO (>80%)';
            } else {
                cardManutencao.classList.remove('alert');
                badgeFalha.className = 'status-badge success';
                badgeFalha.innerText = '✔️ Sistema Saudável';
            }

        }, 2000); // Atualiza a cada 2 segundos
    </script>
</body>
</html>
