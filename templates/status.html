<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bus - Centro de Controle</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
</head>
<body class="fade-in">

    <header>
        <h1>Centro de Controle Operacional</h1>
        <p>Monitoramento em Tempo Real - IA e Sensores Físicos</p>
    </header>

    <div class="dashboard-grid">
        <div class="kpi-card">
            <h3>Variáveis Físicas Atuais</h3>
            <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                <div>
                    <span style="color: var(--text-muted); font-size: 0.9rem;">Lotação</span><br>
                    <span style="font-size: 1.5rem; font-weight: 600;">-- pass.</span>
                </div>
                <div>
                    <span style="color: var(--text-muted); font-size: 0.9rem;">Temp. Externa</span><br>
                    <span style="font-size: 1.5rem; font-weight: 600;">--°C</span>
                </div>
            </div>
        </div>

        <div class="kpi-card">
            <h3>Consumo do HVAC (Real)</h3>
            <div class="value highlight" id="consumo-real">-- kW</div>
        </div>

        <div class="kpi-card" id="card-manutencao">
            <h3>Previsão de Falha (Modelo GB)</h3>
            <div id="badge-falha" class="status-badge success">Aguardando dados...</div>
        </div>
    </div>

    <div class="chart-container">
        <h2>Monitoramento de Resíduo (Potência Esperada vs. Real)</h2>
        <div style="position: relative; height: 90%; width: 100%;">
            <canvas id="residuoChart"></canvas>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/status.js') }}"></script>
</body>
</html>
